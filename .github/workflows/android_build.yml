name: Find Gradle
on: [push]

jobs:
  find-gradle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Search for gradlew file
        run: |
          echo "Looking for gradlew in the whole repository..."
          find . -name "gradlew" -print
          
          echo "---"
          echo "Current directory structure:"
          ls -R
