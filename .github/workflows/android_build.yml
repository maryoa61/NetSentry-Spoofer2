name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: List all files to find gradlew
        run: find . -name "gradlew"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Grant execute permission and Build
        run: |
          # پیدا کردن و مجوز دادن به فایل gradlew در هر پوشه‌ای که هست
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLE_PATH" ]; then
            echo "Error: gradlew not found!"
            exit 1
          fi
          chmod +x "$GRADLE_PATH"
          
          # اجرای بیلد ریلیز
          "$GRADLE_PATH" assembleRelease
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/
